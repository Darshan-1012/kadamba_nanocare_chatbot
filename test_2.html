.donut-wrap{position:relative;flex-shrink:0}
.donut-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--color-text-primary)}
</style>

<div class="app" id="app"></div>

<script>
const CORAL="#c47068",TEAL="#4a9b8e";

const STEPS=[
  {id:"patient", label:"Patient"},
  {id:"inbody",  label:"InBody"},
  {id:"ecg",     label:"ECG"},
  {id:"nadi",    label:"Nadi"},
  {id:"biowell", label:"Bio-Well"},
  {id:"biores",  label:"Bioresn."},
  {id:"generate",label:"Report"},
];

const SYSTEMS=[
  {key:"nervous",        label:"Nervous",       abbr:"NS", color:"#8b7fd4"},
  {key:"cardiovascular", label:"Cardiovascular",abbr:"CV", color:"#d47f7f"},
  {key:"respiratory",    label:"Respiratory",   abbr:"RS", color:"#7fbfd4"},
  {key:"musculoskeletal",label:"Muscle & Bone", abbr:"MB", color:"#d4b07f"},
  {key:"digestive",      label:"Digestive",     abbr:"DG", color:"#7fbd8a"},
  {key:"integumentary",  label:"Integumentary", abbr:"IT", color:"#d4c07f"},
  {key:"endocrine",      label:"Endocrine",     abbr:"EN", color:"#d47fb0"},
  {key:"urogenital",     label:"Urogenital",    abbr:"UG", color:"#7fc4d4"},
  {key:"reproductive",   label:"Reproductive",  abbr:"RP", color:"#b0d47f"},
  {key:"immune",         label:"Immune",        abbr:"IM", color:"#d4907f"},
];

const state={
  step:"patient",
  reportPage:1,
  showReport:false,
  d:{
    patient:{name:"",age:"",gender:"",date:""},
    inbody:{weight:"",bmi:"",bodyFat:"",smm:"",visceralFat:""},
    ecg:{heartRate:"",prInterval:"",qrsInterval:"",qtInterval:"",riskLevel:"Low",overall:"Normal ECG",lfhfRatio:""},
    nadi:{pulseRate:"",rhythm:"Regular",remark:"Good",prakruti:"",vikruti:"",
      digestion:"",toxin:"",hydration:"",immunity:"",stress:"",overthinking:"",flexibility:"",
      diet:"",yoga:"",physicalActivity:"",sleep:"",supplements:"",medicine:"",strongOrgans:"",weakOrgans:""},
    biowell:{energy:"",energyReserve:"",stressIndex:"",chakraAlignment:"",
      physicalActivity:"",nutrition:"",psychology:"",sleepRegime:"",hormones:"",environment:"",
      lifestyle:""},
    biores:{flaggedItems:"",generalNote:""},
  }
};

function v(path){
  const keys=path.split(".");
  let o=state.d;
  for(const k of keys) o=o?.[k];
  return o??""
}

function set(path,val){
  const keys=path.split(".");
  let o=state.d;
  for(let i=0;i<keys.length-1;i++) o=o[keys[i]];
  o[keys[keys.length-1]]=val;
}

function field(label,path,type,opts){
  type=type||"text";
  const cur=v(path);
  if(type==="select"){
    const options=(opts||[]).map(o=>`<option value="${o}" ${cur===o?"selected":""}>${o}</option>`).join("");
    return `<div class="field"><label>${label}</label><select onchange="set('${path}',this.value)">${options}</select></div>`;
  }
  if(type==="textarea"){
    return `<div class="field" style="grid-column:1/-1"><label>${label}</label><textarea rows="3" oninput="set('${path}',this.value)">${cur}</textarea></div>`;
  }
  return `<div class="field"><label>${label}</label><input type="${type}" value="${cur}" oninput="set('${path}',this.value)" placeholder="${opts||""}"></div>`;
}

function donut(score,size){
  size=size||70;const r=(size-10)/2,c=size/2,circ=2*Math.PI*r,prog=(Math.min(Number(score)||0,100)/100)*circ;
  const color=Number(score)>=70?CORAL:"#e89060";
  return `<div class="donut-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="var(--color-border-tertiary)" stroke-width="6"/>
      <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${color}" stroke-width="6"
        stroke-dasharray="${prog.toFixed(1)} ${(circ-prog).toFixed(1)}" stroke-linecap="round"/>
    </svg>
    <div class="donut-center">${score||0}%</div>
  </div>`;
}

function computeReport(){
  const d=state.d;
  const n=Number;
  const clamp=(x,mn,mx)=>Math.max(mn,Math.min(mx,x));

  // Physical score
  const bmi=n(d.inbody.bmi)||23;
  const bmiScore= bmi>=18.5&&bmi<=24.9?90: bmi>=25&&bmi<=29.9?65: bmi<18.5?60:45;
  const bfat=n(d.inbody.bodyFat);
  const bfScore= bfat<25?85: bfat<30?70:55;
  const ecgOk= d.ecg.riskLevel==="Low"?90:60;
  const visf=n(d.inbody.visceralFat)||5;
  const visfScore= visf<10?90: visf<13?65:40;
  const physicalScore=Math.round((bmiScore+bfScore+ecgOk+visfScore)/4);

  // Emotional score
  const nadiStress=100-(n(d.nadi.stress)||60);
  const bwStress=n(d.biowell.stressIndex)||2.31;
  const bwStressScore= bwStress<=2?90: bwStress<=3?80: bwStress<=4?65: bwStress<=6?50:35;
  const vikruti=(d.nadi.vikruti||"").toLowerCase();
  const vikrutiScore= vikruti.includes("vata")||vikruti.includes("pitta")?65:80;
  const emotionalScore=Math.round((nadiStress+bwStressScore+vikrutiScore)/3);

  // Psychological score
  const bwPsych=n(d.biowell.psychology)||84;
  const overthink=100-(n(d.nadi.overthinking)||30);
  const psychScore=Math.round((bwPsych+overthink)/2);

  // Spiritual score
  const chakra=n(d.biowell.chakraAlignment)||87;
  const er=n(d.biowell.energyReserve)||100;
  const spiritualScore=Math.round((chakra+(er>60?90:er>20?70:50))/2);

  // System scores
  const lfhf=n(d.ecg.lfhfRatio)||2.97;
  const nervous={score:Math.round(clamp(100-((lfhf-1)*15),40,95)), status:""};
  nervous.status= nervous.score>=70?"Normal":"Need Attention";

  const cvScore=Math.round(clamp((ecgOk*0.5)+(visfScore*0.5),40,95));
  const cardiovascular={score:cvScore, status:cvScore>=70?"Normal":"Need Attention"};

  const respScore=Math.round(clamp((n(d.biowell.environment)||85)*0.7+(100-(n(d.nadi.stress)||60))*0.3,40,95));
  const respiratory={score:respScore, status:respScore>=70?"Normal":"Need Attention"};

  const smm=n(d.inbody.smm)||28;
  const smmScore= smm>=25?85: smm>=20?70:55;
  const flex=n(d.nadi.flexibility)||50;
  const musculoskeletal={score:Math.round((smmScore+flex)/2),status:""};
  musculoskeletal.status= musculoskeletal.score>=70?"Normal":"Need Attention";

  const dig=n(d.nadi.digestion)||30;
  const tox=100-(n(d.nadi.toxin)||40);
  const digestive={score:Math.round((dig+tox)/2),status:""};
  digestive.status= digestive.score>=70?"Normal":"Need Attention";

  const hyd=n(d.nadi.hydration)||80;
  const integScore=Math.round(clamp((hyd*0.5)+(vikrutiScore*0.5),40,90));
  const integumentary={score:integScore,status:integScore>=70?"Normal":"Need Attention"};

  const horScore=Math.round(n(d.biowell.hormones)||62);
  const endocrine={score:horScore,status:horScore>=70?"Normal":"Need Attention"};

  const kidEnergy=Math.round((hyd*0.6)+(bwStressScore*0.4));
  const urogenital={score:clamp(kidEnergy,40,95),status:""};
  urogenital.status= urogenital.score>=70?"Normal":"Need Attention";

  const repScore=Math.round(clamp((spiritualScore*0.5)+(horScore*0.5),40,90));
  const reproductive={score:repScore,status:repScore>=70?"Normal":"Need Attention"};

  const imm=n(d.nadi.immunity)||40;
  const immuneScore=Math.round((imm*0.6)+(smmScore*0.4));
  const immune={score:immuneScore,status:immuneScore>=70?"Normal":"Need Attention"};

  // Physical dimension description
  const physDesc= physicalScore>=70
    ? `Body composition is within acceptable parameters. ECG readings are ${d.ecg.overall||"Normal"} with ${d.ecg.riskLevel||"Low"} cardiac risk.`
    : `Body composition requires attention — focus on visceral fat reduction and muscle balance. Cardiac function is ${d.ecg.overall||"Normal"}.`;

  const emDesc= emotionalScore>=70
    ? `Bio-Well stress index is optimal at ${d.biowell.stressIndex||"—"}. Emotional regulation appears stable with current Vikruti of ${d.nadi.vikruti||"—"}.`
    : `Vikruti shows ${d.nadi.vikruti||"imbalance"} affecting emotional stability. Stress level is ${n(d.nadi.stress)>=60?"elevated":"moderate"} at ${d.nadi.stress||"—"}% requiring active management.`;

  const psyDesc= psychScore>=70
    ? `Psychological state is balanced. Bio-Well psychology score of ${d.biowell.psychology||"—"}% reflects good cognitive resilience.`
    : `Overthinking tendency at ${d.nadi.overthinking||"—"}% and Bio-Well psychology at ${d.biowell.psychology||"—"}% indicate cognitive overload needing structured intervention.`;

  const spirDesc= spiritualScore>=70
    ? `Chakra alignment at ${d.biowell.chakraAlignment||"—"}% indicates good energetic coherence. Energy reserves are robust.`
    : `Chakra alignment at ${d.biowell.chakraAlignment||"—"}% needs improvement. Low energy reserve (${d.biowell.energyReserve||"—"}%) suggests depletion of vital essence.`;

  return {
    patient:{name:d.patient.name,age:d.patient.age+" · "+d.patient.gender,date:d.patient.date},
    metrics:{
      weight:d.inbody.weight, bmi:d.inbody.bmi, bodyFat:d.inbody.bodyFat,
      heartRate:d.ecg.heartRate, bioEnergy:d.biowell.energy, energyReserve:d.biowell.energyReserve,
      lfhfRatio:d.ecg.lfhfRatio, nadiPulse:d.nadi.pulseRate
    },
    dimensions:{
      physical:{score:physicalScore,description:physDesc},
      emotional:{score:emotionalScore,description:emDesc},
      psychological:{score:psychScore,description:psyDesc},
      spiritual:{score:spiritualScore,description:spirDesc},
    },
    systems:{nervous,cardiovascular,respiratory,musculoskeletal,digestive,integumentary,endocrine,urogenital,reproductive,immune},
    wellness:{
      diet:d.nadi.diet||"No dietary notes entered.",
      yoga:d.nadi.yoga||"No yoga notes entered.",
      physicalActivity:d.nadi.physicalActivity||"No activity notes entered.",
      sleep:d.nadi.sleep||"No sleep notes entered.",
      stress:`Stress index ${d.biowell.stressIndex||"—"} (Optimal ≤ 3.0). ${d.nadi.stress?"Nadi stress level "+d.nadi.stress+"%.":""}`,
      supplements:d.nadi.supplements||"No supplement notes entered.",
      medicine:d.nadi.medicine||"No medicine notes entered.",
      bioresNote:d.biores.flaggedItems?"Bioresonance flagged: "+d.biores.flaggedItems:"",
    }
  };
}

function renderStepTabs(){
  const si=STEPS.findIndex(s=>s.id===state.step);
  return STEPS.map((s,i)=>{
    const cls= s.id===state.step?"active": i<si?"done":"";
    return `<div class="step-tab ${cls}" onclick="goStep('${s.id}')">${s.label}</div>`;
  }).join("");
}

  return `<div class="form-section">
    <div class="section-title">Patient Details</div>

function renderPage1(r){
  const m=r.metrics,dims=r.dimensions,sys=r.systems,p=r.patient;
  const mBoxes=[
    {val:m.weight,unit:"kg",label:"Weight",src:"InBody"},
    {val:m.bodyFat,unit:"%",label:"Body Fat",src:"InBody"},
    {val:m.bmi,unit:"",label:"BMI",src:"InBody"},
    {val:m.heartRate,unit:"bpm",label:"Heart Rate",src:"ECG"},
    {val:m.bioEnergy,unit:"J",label:"Bio-Energy",src:"BioWell"},
    {val:m.energyReserve,unit:"%",label:"Energy Res.",src:"BioWell"},
    {val:m.lfhfRatio,unit:"",label:"LF/HF",src:"HRV"},
    {val:m.nadiPulse,unit:"bpm",label:"Nadi Pulse",src:"Nadi"},
  ].map(b=>`<div class="metric-box">
    <div class="metric-val">${b.val||"—"}<span class="metric-unit">${b.unit}</span></div>
    <div class="metric-label">${b.label}</div>
    <div class="metric-src">${b.src}</div>
  </div>`).join("");

  const dimData=[
    {key:"physical",label:"Physical",side:"left"},
    {key:"emotional",label:"Emotional",side:"right"},
    {key:"psychological",label:"Psychological",side:"left"},
    {key:"spiritual",label:"Spiritual",side:"right"},
  ];
  const leftH=dimData.filter(d=>d.side==="left").map(d=>{
    const dv=dims[d.key];
    return `<div class="dim-card">${donut(dv.score,64)}<div class="dim-info"><div class="dim-title">${d.label}</div><div class="dim-desc">${dv.description}</div></div></div>`;
  }).join("");
  const rightH=dimData.filter(d=>d.side==="right").map(d=>{
    const dv=dims[d.key];
    return `<div class="dim-card right">${donut(dv.score,64)}<div class="dim-info"><div class="dim-title">${d.label}</div><div class="dim-desc">${dv.description}</div></div></div>`;
  }).join("");

  const bodySVG=`<svg width="50" height="82" viewBox="0 0 50 82" fill="none" style="opacity:0.12">
    <circle cx="25" cy="8" r="7" fill="var(--color-text-primary)"/>
    <rect x="16" y="18" width="18" height="24" rx="4" fill="var(--color-text-primary)"/>
    <rect x="5" y="19" width="9" height="20" rx="4" fill="var(--color-text-primary)"/>
    <rect x="36" y="19" width="9" height="20" rx="4" fill="var(--color-text-primary)"/>
    <rect x="16" y="44" width="8" height="28" rx="4" fill="var(--color-text-primary)"/>
    <rect x="26" y="44" width="8" height="28" rx="4" fill="var(--color-text-primary)"/>
  </svg>`;

  const row1=SYSTEMS.slice(0,5).map(s=>{const sv=sys[s.key];const ok=sv.status==="Normal";
    return `<div class="sys-card"><div class="sys-circle" style="background:${s.color}18;border:1.5px solid ${s.color}44;color:${s.color}">${s.abbr}</div>
    <div><div class="sys-pct">${sv.score}%</div><div class="sys-status ${ok?"status-normal":"status-attn"}">${sv.status}</div><div class="sys-label">${s.label}</div></div></div>`;
  }).join("");
  const row2=SYSTEMS.slice(5).map(s=>{const sv=sys[s.key];const ok=sv.status==="Normal";
    return `<div class="sys-card"><div class="sys-circle" style="background:${s.color}18;border:1.5px solid ${s.color}44;color:${s.color}">${s.abbr}</div>
    <div><div class="sys-pct">${sv.score}%</div><div class="sys-status ${ok?"status-normal":"status-attn"}">${sv.status}</div><div class="sys-label">${s.label}</div></div></div>`;
  }).join("");

  return `<div class="report-header">
    <div class="report-title">Wellness Report</div>
    <div class="patient-info"><div class="patient-name">${p.name||"—"}</div><div>${p.age||""}</div><div>${p.date||""}</div></div>
  </div>
  <div class="metrics-row">${mBoxes}</div>
  <div class="dims-section">
    <div class="dims-col">${leftH}</div>
    <div class="body-center">${bodySVG}</div>
    <div class="dims-col">${rightH}</div>
  </div>
  <div class="systems-section">
    <div class="systems-grid" style="margin-bottom:8px">${row1}</div>
    <div class="systems-grid">${row2}</div>
  </div>`;
}

function renderPage2(r){
  const w=r.wellness,p=r.patient;
  const cards=[
    {key:"diet",label:"Diet"},
    {key:"yoga",label:"Yoga Therapy"},
    {key:"physicalActivity",label:"Physical Activity"},
    {key:"sleep",label:"Sleep"},
    {key:"stress",label:"Stress Management"},
    {key:"supplements",label:"Supplements"},
  ].map(c=>`<div class="wellness-card"><div class="wellness-card-title">${c.label}</div><div class="wellness-card-body">${w[c.key]||"—"}</div></div>`).join("");
  return `<div class="report-header">
    <div class="report-title">Wellness Report</div>
    <div class="patient-info"><div class="patient-name">${p.name||"—"}</div><div>${p.age||""}</div></div>
  </div>
  <div class="wellness-title">Wellness Offerings</div>
  <div class="wellness-grid">${cards}</div>
  <div class="wellness-full"><div class="wellness-card-title">Medicine & Ayurvedic Herbs</div><div class="wellness-card-body">${w.medicine||"—"}${w.bioresNote?`<br><br><strong>Bioresonance Note:</strong> ${w.bioresNote}`:""}</div></div>`;
}

function renderApp(){
  const app=document.getElementById("app");
  if(state.showReport){
    const r=computeReport();
    app.innerHTML=`<div>
      <div class="report-nav">
        <div class="nav-tabs">
          <button class="tab ${state.reportPage===1?"active":""}" onclick="setReportPage(1)">Overview</button>
          <button class="tab ${state.reportPage===2?"active":""}" onclick="setReportPage(2)">Wellness Offerings</button>
        </div>
        <button class="reset-btn" onclick="backToForm()">← Edit</button>
      </div>
      ${state.reportPage===1?renderPage1(r):renderPage2(r)}
    </div>`;
    return;
  }

  const stepContent={
    patient:renderPatient(),
    inbody:renderInBody(),
    ecg:renderECG(),
    nadi:renderNadi(),
    biowell:renderBioWell(),
    biores:renderBioRes(),
  }[state.step]||"";

  const si=STEPS.findIndex(s=>s.id===state.step);
  const isLast=state.step==="biores";

  app.innerHTML=`<div>
    <div class="hdr"><h1>Kadamba Wellness Report Engine</h1><p>Enter data from all 5 device reports, then generate the unified wellness summary</p></div>
    <div class="step-tabs">${renderStepTabs()}</div>
    ${stepContent}
    <div class="nav-btns">
      <button class="btn" onclick="prevStep()" ${si===0?"disabled":""}>← Back</button>
      ${isLast
        ? `<button class="btn btn-primary" onclick="generateReport()">Generate Report →</button>`
        : `<button class="btn btn-primary" onclick="nextStep()">Next →</button>`
      }
    </div>
  </div>`;
}

function goStep(id){state.step=id;renderApp()}
function nextStep(){
  const si=STEPS.findIndex(s=>s.id===state.step);
  if(si<STEPS.length-2){state.step=STEPS[si+1].id;renderApp()}
}
function prevStep(){
  const si=STEPS.findIndex(s=>s.id===state.step);
  if(si>0){state.step=STEPS[si-1].id;renderApp()}
}
function generateReport(){state.showReport=true;state.reportPage=1;renderApp()}
function setReportPage(p){state.reportPage=p;renderApp()}
function backToForm(){state.showReport=false;state.step="biores";renderApp()}

renderApp();
</script>
